<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Daily Quests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/quest.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="../home.html">Glucode</a></div>
            <ul>
                <li><a href="../home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="../Glucode LeaderBoard/leader_board.html">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="quest-wrapper">
        <div class="quest-header">
            <div class="header-titles">
                <h2><i class="fa-solid fa-bullseye" style="color: #ef4444; margin-right: 10px;"></i> ภารกิจประจำวัน (Daily Quests)</h2>
                <p>ทำภารกิจให้สำเร็จเพื่อรับเหรียญไปซื้อธีมใหม่ๆ <br><span class="reset-note"><i class="fa-regular fa-clock"></i> รีเซ็ตภารกิจใหม่ในอีก: <strong id="countdownTimer">--:--:--</strong></span></p>
            </div>
            <div class="coin-display-card">
                <i class="fa-solid fa-coins"></i>
                <span id="questCoinDisplay">0</span>
            </div>
        </div>

        <div class="quest-list" id="questContainer">
            </div>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/quest.js"></script>
</body>
</html>
