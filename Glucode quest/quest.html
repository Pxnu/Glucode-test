<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quests | Glucode</title>
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/quest.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav style="width: 100%; z-index: 100;">
        <div class="container" style="max-width: 1440px; padding: 1.5rem 2.25rem; background: transparent; box-shadow: none;">
            <div class="logo">
                <a href="../Home.html" style="color: var(--text); font-weight: bold; font-size: 2rem; text-decoration: none;">Glucode</a>
            </div>
            <ul style="margin: 0; padding: 0;">
                <li><a href="../Home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="#">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="quest-container">
        <header>
            <h1>Glucode Quests</h1>
            <p class="subtext">ทำภารกิจเพื่อรับเหรียญรางวัล</p>
        </header>

        <div class="point-and-achievement">
            <div class="currency-display">
                <span class="coin-icon">💰</span>
                <span id="user-coins">0</span>
            </div>

            <div class="achievement">
                <a href="./achievement.html">Achievement</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span class="stat-label">Games Played</span><span class="stat-value" id="total-games">0/100</span></div>
            <div class="stat-box"><span class="stat-label">Best Streak</span><span class="stat-value" id="streak-count">🔥</span></div>
        </div>
        <div id="quest-list"></div>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light" title="Light Mode"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark" title="Dark Mode"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter" title="Winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter" title="Easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/quest.js"></script>
</body>
</html>
