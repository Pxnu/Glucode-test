<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Duo | Glucode</title>
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/duo.css">
    <link rel="stylesheet" href="../css/achievement.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav style="width: 100%; z-index: 100;">
        <div class="container"
            style="max-width: 1440px; padding: 1.5rem 2.25rem; background: transparent; box-shadow: none;">
            <div class="logo">
                <a href="../Home.html"
                    style="color: var(--text); font-weight: bold; font-size: 2rem; text-decoration: none;">Glucode</a>
            </div>
            <ul style="margin: 0; padding: 0;">
                <li><a href="../Home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="#">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="game-wrapper">
        <div class="card">
            <div class="header-row">
                <div class="game-status-bar">
                    <div class="status-badge coin-badge" id="coinDisplay">💰 0</div>
                    <div class="status-badge">
                        <span style="color: var(--subtext); font-size: 0.85em;">Mode:</span>
                        <select id="difficultySelect" class="diff-select" onchange="changeDifficulty(this.value)">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                            <option value="expert">Expert</option>
                        </select>
                    </div>
                    <div class="status-badge score-badge" id="scoreDisplay">Score: 0</div>
                    <div class="status-badge level-badge" id="levelDisplay">Round: 1 / 5</div>
                </div>
            </div>

            <div class="pieces-container">
                <div id="hintText" class="hint-text">กำลังโหลดโจทย์...</div>
            </div>

            <div class="game-area">
                <div class="answer-box">
                    <input type="text" id="userInput" placeholder="ประกอบโค้ดที่นี่..." autocomplete="off">
                </div>
            </div>
            <button class="submit-btn" id="submitBtn">Submit</button>
            <button class="skip-btn" id="skipBtn" onclick="promptSkip()">Skip Level</button>

            <div id="resultMessage"></div>
        </div>
    </div>

    <div id="skipConfirmPopup" class="popup-overlay">
        <div class="popup-box">
            <h2>⏭️ ยืนยันการข้าม?</h2>
            <p>ต้องใช้ <span id="skipCostText" style="color:#f59e0b; font-weight:bold; font-size: 1.5rem;">0</span>
                Coins เพื่อข้ามด่านนี้</p>
            <div class="popup-buttons">
                <button style="background: var(--subtext); color: white;"
                    onclick="closePopup('skipConfirmPopup')">ยกเลิก</button>
                <button style="background: #ef4444; color: white;" onclick="executeSkip()">ยืนยัน (-Coin)</button>
            </div>
        </div>
    </div>

    <div id="progressionPopup" class="popup-overlay">
        <div class="popup-box">
            <h2 id="progTitle">🎉 เยี่ยมมาก!</h2>
            <p id="progDesc">คุณเล่นผ่านระดับนี้แล้ว สามารถไปด่านถัดไปได้</p>
            <div class="popup-buttons" id="progBtns" style="flex-wrap: wrap;"></div>
        </div>
    </div>

    <div id="gameClearPopup" class="popup-overlay">
        <div class="popup-box">
            <h2>🏆 CONGRATULATION!</h2>
            <p>สุดยอดมาก! คุณเล่นเคลียร์ครบทุกด่านของเกมนี้แล้ว 🎉</p>
            <div class="popup-buttons">
                <button class="goHome" onclick="goHome()" style="width: 100%;">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

    <div class="theme-switcher">
        <button class="theme-btn" data-theme="light" title="Light Theme"><i class="fa-solid fa-sun"></i></button>
        <button class="theme-btn" data-theme="dark" title="Dark Theme"><i class="fa-solid fa-moon"></i></button>
        <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
        <button class="theme-btn" data-theme="winter" title="Winter Theme"><i
                class="fa-solid fa-snowflake"></i></button>
        <button class="theme-btn" data-theme="easter" title="Easter Theme"><i class="fa-solid fa-egg"></i></button>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/quest.js"></script>
    <script src="../js/achievement.js"></script>
    <script src="../js/duo.js"></script>
</body>

</html>
