<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard Duo | Glucode</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/leader_board_duo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav style="width: 100%; z-index: 100;">
        <div class="container" style="max-width: 1440px; padding: 1.5rem 2.25rem; background: transparent; box-shadow: none;">
            <div class="logo">
                <a href="../Home.html" style="color: var(--text); font-weight: bold; font-size: 2rem; text-decoration: none;">Glucode</a>
            </div>
            <ul style="margin: 0; padding: 0;">
                <li><a href="../Home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="#">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="leaderboard-wrapper">
        <h1>LEADERBOARD BOXGAME</h1>
        <div class="leaderboard-container">
            <div class="header"><div>อันดับ</div><div>ชื่อ</div><div>คะแนน</div></div>
            <div id="board"></div>
        </div>
    </div>

    <div class="theme-switcher">
        <button class="theme-btn" data-theme="light" title="Light Theme"><i class="fa-solid fa-sun"></i></button>
        <button class="theme-btn" data-theme="dark" title="Dark Theme"><i class="fa-solid fa-moon"></i></button>
        <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
        <button class="theme-btn" data-theme="winter" title="Winter Theme"><i class="fa-solid fa-snowflake"></i></button>
        <button class="theme-btn" data-theme="easter" title="Easter Theme"><i class="fa-solid fa-egg"></i></button>
    </div>

    <script src="../script/theme.js"></script>
    <script src="../script/auth.js"></script>
    <script src="../script/ui.js"></script>
    <script src="../script/leader_board_boxgame.js"></script>
</body>
</html>
