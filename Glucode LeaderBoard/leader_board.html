<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Leaderboard</title>
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/leaderboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav>
        <div class="container">
            <div class="logo">
                <a href="../Home.html">Glucode</a>
            </div>
            <ul>
                <li><a href="../Home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="#">Leader Board</a></li>
                <li><a href="../Login.html">Sign In</a></li>
            </ul>
        </div>
    </nav>

    <div class="leaderboard-wrapper">
        <h1>Global Leader Board</h1>
        
        <div class="leaderboard-container">
            <div class="header">
                <div>Rank</div>
                <div>Player</div>
                <div>Score</div>
            </div>
            
            <div id="board">
                <p style="text-align:center; padding: 20px; color: var(--subtext);">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <div class="theme-switcher">
        <button class="theme-btn active" data-theme="light" title="Light Theme"><i class="fa-solid fa-sun"></i></button>
        <button class="theme-btn" data-theme="dark" title="Dark Theme"><i class="fa-solid fa-moon"></i></button>
        <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
        <button class="theme-btn" data-theme="winter" title="Winter Theme"><i class="fa-solid fa-snowflake"></i></button>
        <button class="theme-btn" data-theme="easter" title="Easter Theme"><i class="fa-solid fa-egg"></i></button>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/leaderboard.js"></script>
</body>

</html>
