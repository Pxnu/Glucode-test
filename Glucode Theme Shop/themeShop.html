<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Theme Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/themeShop.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="../index.html">Glucode</a></div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="../Glucode LeaderBoard/leader_board.html">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="shop-wrapper">
        <div class="shop-header">
            <div>
                <h2 style="font-size: 2rem; color: var(--text); margin-bottom: 5px;">Theme Shop</h2>
                <p style="color: var(--subtext);">ซื้อและปรับแต่งสีสันให้เว็บไซต์ของคุณ</p>
            </div>
            <div class="coin-balance">
                <i class="fa-solid fa-coins"></i> <span id="shopCoinDisplay">0</span>
            </div>
        </div>

        <div class="theme-grid" id="themeGrid">
            </div>
    </div>

    <div id="shopAlertModal" class="popup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100000; padding: 20px;">
        <div class="popup-box" style="background: var(--box); padding: 2.5rem 2rem; border-radius: 24px; text-align: center; max-width: 400px; width: 100%; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div id="shopAlertIcon" style="font-size: 3.5rem; margin-bottom: 15px;"></div>
            <h2 id="shopAlertTitle" style="font-size: 1.5rem; margin-bottom: 10px; color: var(--text);">แจ้งเตือน</h2>
            <p id="shopAlertMessage" style="color: var(--subtext); font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px;">ข้อความแจ้งเตือน</p>
            <div class="popup-buttons" style="display: flex; gap: 12px; justify-content: center;">
                <button id="shopAlertBtn" onclick="closeShopAlert()" style="padding: 12px 30px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--btn); color: white; font-size: 1rem; width: 100%;">ตกลง</button>
            </div>
        </div>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/themeShop.js"></script>
</body>
</html>
