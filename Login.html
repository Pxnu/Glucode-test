<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | Glucode</title>
  <link rel="stylesheet" href="./css/core.css">
  <link rel="stylesheet" href="./css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light" title="Light Mode"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark" title="Dark Mode"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter" title="Winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter" title="Easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

  <div class="login-wrapper">
    <div class="login-container">
      <h2 id="title">Login</h2>
      <div class="input-group">
        <input type="text" id="username" placeholder="Username">
      </div>
      <div class="input-group hidden" id="emailGroup">
        <input type="email" id="email" placeholder="Email">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password">
      </div>
      <button class="login-btn" id="mainBtn">Login</button>
      <p id="message"></p>
      <div class="footer-text">
        <span id="toggleText">Don't have an account?</span>
        <span class="link" id="toggleModeBtn">SIGN UP</span>
      </div>
    </div>
  </div>

  <script src="./js/core.js"></script>
  <script src="./js/login.js"></script>
</body>

</html>
