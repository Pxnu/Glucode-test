<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Manage Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="../Home.html">Glucode</a></div>
            <ul>
                <li><a href="../Home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="../Glucode LeaderBoard/leader_board.html">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="settings-wrapper">
        <div class="settings-header">
            <h2><i class="fa-solid fa-user-gear"></i> Manage Profile</h2>
            <p>จัดการข้อมูลส่วนตัวและการตั้งค่าบัญชีของคุณ</p>
        </div>

        <div class="settings-card">
            <div class="avatar-section">
                <div class="avatar-preview">
                    <img src="../profile/images/user.png" alt="User Avatar" id="settingAvatar">
                    <button class="edit-avatar-btn" title="Change Avatar"><i class="fa-solid fa-camera"></i></button>
                </div>
                <div class="avatar-info">
                    <h3 id="displayCurrentUsername">Username</h3>
                    <p>อัปเดตรูปโปรไฟล์และข้อมูลส่วนตัวของคุณได้ที่นี่</p>
                </div>
            </div>

            <hr class="settings-divider">

            <form id="settingsForm" class="settings-form">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="editUsername"><i class="fa-solid fa-user"></i> Username (ชื่อผู้ใช้)</label>
                        <input type="text" id="editUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail"><i class="fa-solid fa-envelope"></i> Email (อีเมล)</label>
                        <input type="email" id="editEmail" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="editBio"><i class="fa-solid fa-pen-to-square"></i> Bio (คำแนะนำตัว)</label>
                    <textarea id="editBio" rows="4" placeholder="บอกเล่าเรื่องราวของคุณให้โลกรู้..."></textarea>
                </div>

                <hr class="settings-divider">
                
                <h3 class="section-title"><i class="fa-solid fa-lock"></i> เปลี่ยนรหัสผ่าน (Change Password)</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editPassword">รหัสผ่านใหม่ (ปล่อยว่างไว้ถ้าไม่ต้องการเปลี่ยน)</label>
                        <input type="password" id="editPassword" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••">
                    </div>
                </div>

                <div id="settingsMessage" class="settings-message"></div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="window.location.href='profile.html'">ยกเลิก</button>
                    <button type="submit" class="btn-save"><i class="fa-solid fa-floppy-disk"></i> บันทึกการเปลี่ยนแปลง</button>
                </div>

            </form>
        </div>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light" title="Light Mode"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark" title="Dark Mode"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween" title="Halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter" title="Winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter" title="Easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
