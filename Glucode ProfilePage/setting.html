<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="../home.html">Glucode</a></div>
            <ul>
                <li><a href="../home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="../Glucode LeaderBoard/leader_board.html">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="profile-wrapper" style="grid-template-columns: 1fr; max-width: 800px;">
        <main class="profile-content">
            <div class="content-header">
                <h2>Account Settings</h2>
                <a href="profile.html" class="edit-link"><i class="fa-solid fa-arrow-left"></i> Back to Profile</a>
            </div>

            <div class="info-grid">
                <div class="info-group full-width">
                    <label>รูปโปรไฟล์ (Profile Avatar)</label>
                    <div class="avatar-edit-container" style="display: flex; align-items: center; gap: 20px; background: var(--bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border);">
                        <img src="images/user.png" id="setting-avatar-preview" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--btn);">
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            <input type="file" id="avatar-input" accept="image/*" style="font-size: 0.9rem; color: var(--text); background: transparent; border: none; padding: 0;">
                            <p class="helper-text" style="margin: 0;">รองรับไฟล์ JPG, PNG ขนาดไม่เกิน 2MB</p>
                        </div>
                    </div>
                </div>

                <div class="info-group">
                    <label>Username</label>
                    <input type="text" id="setting-username" class="profile-select" placeholder="ตั้งชื่อผู้ใช้ใหม่ของคุณ">
                </div>
                <div class="info-group">
                    <label>Email Address</label>
                    <input type="email" id="setting-email" class="profile-select" placeholder="กรอกอีเมลของคุณ">
                </div>

                <div class="info-group full-width" style="margin-top: 20px;">
                    <h3 style="color: var(--text); font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 10px;">เปลี่ยนรหัสผ่าน</h3>
                </div>

                <div class="info-group full-width">
                    <label>รหัสผ่านปัจจุบัน (หากไม่ต้องการเปลี่ยน ให้เว้นว่างไว้)</label>
                    <input type="password" id="setting-old-pwd" class="profile-select" placeholder="รหัสผ่านปัจจุบัน" style="width: 100%;">
                </div>

                <div class="info-group">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" id="setting-new-pwd" class="profile-select" placeholder="รหัสผ่านใหม่" style="width: 100%;">
                </div>

                <div class="info-group">
                    <label>ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" id="setting-confirm-pwd" class="profile-select" placeholder="ยืนยันรหัสผ่านใหม่" style="width: 100%;">
                </div>
            </div>
            
            <button id="saveSettingsBtn" class="save-btn">บันทึกการตั้งค่า</button>
        </main>
    </div>

    <div id="cropModal" class="popup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100000; padding: 20px;">
        <div class="popup-box" style="background: var(--box); padding: 2.5rem 2rem; border-radius: 24px; text-align: center; max-width: 500px; width: 100%; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <h2 style="font-size: 1.5rem; margin-bottom: 15px; color: var(--text);"><i class="fa-solid fa-crop-simple"></i> จัดตำแหน่งรูปโปรไฟล์</h2>
            <div class="crop-container" style="max-height: 400px; overflow: hidden; margin-bottom: 20px; background: var(--bg); border-radius: 12px;">
                <img id="cropImage" src="" style="max-width: 100%; display: block;">
            </div>
            <div class="popup-buttons" style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn-cancel" onclick="closeCropModal()" style="flex: 1; padding: 14px 20px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--subtext); color: white;">ยกเลิก</button>
                <button class="btn-primary" id="cropConfirmBtn" style="flex: 1; padding: 14px 20px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--btn); color: white;">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="passwordAlertModal" class="popup-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100000; padding: 20px;">
        <div class="popup-box" style="background: var(--box); padding: 2.5rem 2rem; border-radius: 24px; text-align: center; max-width: 400px; width: 100%; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div id="pwdAlertIcon" style="font-size: 3.5rem; margin-bottom: 15px;"></div>
            <h2 id="pwdAlertTitle" style="font-size: 1.5rem; margin-bottom: 10px; color: var(--text);">แจ้งเตือน</h2>
            <p id="pwdAlertMessage" style="color: var(--subtext); font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px;">ข้อความแจ้งเตือน</p>
            <div class="popup-buttons" style="display: flex; gap: 12px; justify-content: center;">
                <button id="pwdAlertBtn" onclick="closePwdAlertModal()" style="padding: 12px 30px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--btn); color: white; font-size: 1rem;">ตกลง</button>
            </div>
        </div>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
