<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucode - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/core.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo"><a href="../home.html">Glucode</a></div>
            <ul>
                <li><a href="../home.html">Home</a></li>
                <li><a href="../Glucode LearnPage/Learn.html">Learn</a></li>
                <li><a href="../Glucode LeaderBoard/leader_board.html">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="profile-wrapper">
        <aside class="profile-sidebar">
            <div class="avatar-container">
                <img src="images/user.png" alt="Avatar" class="avatar-img" id="profile-avatar">
            </div>
            <h1 class="profile-name" id="disp-username">Username</h1>
            <div class="title-badge" id="selected-title-display">Newbie Coder</div>
            
            <div class="mini-stats">
                <div class="stat-item">
                    <b id="disp-coins">0</b>
                    <span>Coins</span>
                </div>
                <div class="stat-item">
                    <b id="disp-total-score">0</b>
                    <span>Total Score</span>
                </div>
            </div>
        </aside>

        <main class="profile-content">
            <div class="content-header">
                <h2>My Profile</h2>
                <a href="setting.html" class="edit-link"><i class="fa-solid fa-gear"></i> Settings</a>
            </div>

            <div class="info-grid">
                <div class="info-group">
                    <label>Username</label>
                    <div class="info-value" id="val-username">User</div>
                </div>
                <div class="info-group">
                    <label>Email Address</label>
                    <div class="info-value" id="val-email">user@example.com</div>
                </div>
                
                <div class="info-group full-width">
                    <label for="title-select">เลือกฉายาที่คุณได้รับ</label>
                    <select id="title-select" class="profile-select">
                        <option value="">-- ไม่ใช้ฉายา --</option>
                    </select>
                    <p class="helper-text">ฉายาจะได้มาจากการสะสม Achievement ในหน้าภารกิจ</p>
                </div>
            </div>
            <button id="saveProfileBtn" class="save-btn">บันทึกข้อมูลส่วนตัว</button>
        </main>
    </div>

    <div class="theme-switcher" id="themeSwitcherBox">
        <button class="theme-toggle-btn" id="themeToggleBtn">
            <i class="fa-solid fa-palette"></i>
            <i class="fa-solid fa-angle-up arrow-icon"></i>
        </button>
        <div class="theme-options" id="themeOptions">
            <button class="theme-btn" data-theme="light"><i class="fa-solid fa-sun"></i></button>
            <button class="theme-btn" data-theme="dark"><i class="fa-solid fa-moon"></i></button>
            <button class="theme-btn" data-theme="halloween"><i class="fa-solid fa-ghost"></i></button>
            <button class="theme-btn" data-theme="winter"><i class="fa-solid fa-snowflake"></i></button>
            <button class="theme-btn" data-theme="easter"><i class="fa-solid fa-egg"></i></button>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
